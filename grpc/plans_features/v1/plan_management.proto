syntax = "proto3";

package plans_features.v1;

option go_package = "lviv_backend/api/gen/plans_features/v1;plans_featuresv1";

import "google/protobuf/timestamp.proto";

service PlanManagement {
  rpc CreatePlan(CreatePlanRequest) returns (PlanResponse);
  rpc GetPlan(GetPlanRequest) returns (PlanResponse);
  rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);
  rpc UpdatePlan(UpdatePlanRequest) returns (PlanResponse);
  rpc DeletePlan(DeletePlanRequest) returns (DeletePlanResponse);
}

enum PlanStatus {
  PLAN_STATUS_UNSPECIFIED = 0;
  PLAN_STATUS_ACTIVE = 1;
  PLAN_STATUS_INACTIVE = 2;
  PLAN_STATUS_ARCHIVED = 3;
}

enum BillingPeriod {
  BILLING_PERIOD_UNSPECIFIED = 0;
  BILLING_PERIOD_MONTHLY = 1;
  BILLING_PERIOD_QUARTERLY = 2;
  BILLING_PERIOD_YEARLY = 3;
  BILLING_PERIOD_LIFETIME = 4;
}

message Plan {
  string code = 1;
  string name = 2;
  string description = 3;
  repeated string service_codes = 4;
  repeated string feature_codes = 5;
  PlanStatus status = 6;
  BillingPeriod billing_period = 7;
  int64 price_minor = 8;
  string currency = 9;
  int32 trial_days = 10;
  map<string, string> metadata = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message CreatePlanRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  repeated string service_codes = 4;
  repeated string feature_codes = 5;
  BillingPeriod billing_period = 6;
  int64 price_minor = 7;
  string currency = 8;
  int32 trial_days = 9;
  map<string, string> metadata = 10;
}

message GetPlanRequest {
  string code = 1;
}

message ListPlansRequest {
  PlanStatus status = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListPlansResponse {
  repeated Plan plans = 1;
  string next_page_token = 2;
}

message UpdatePlanRequest {
  string code = 1;
  string name = 2;
  string description = 3;
  repeated string service_codes = 4;
  repeated string feature_codes = 5;
  PlanStatus status = 6;
  BillingPeriod billing_period = 7;
  int64 price_minor = 8;
  string currency = 9;
  int32 trial_days = 10;
  map<string, string> metadata = 11;
}

message DeletePlanRequest {
  string code = 1;
}

message DeletePlanResponse {
  bool success = 1;
}

message PlanResponse {
  Plan plan = 1;
}
