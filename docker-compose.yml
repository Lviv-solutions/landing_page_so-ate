services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: business
    restart: unless-stopped
    ports:
      - "127.0.0.1:3500:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
    env_file:
      - .env
    networks:
      - business-network
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/.next/cache:size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  business-network:
    driver: bridge
