name: Security Scan - SBOM

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t landing-page-so-ate:${{ github.sha }} .

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Create reports directory
        run: mkdir -p security/reports

      # Step 1: Generate SBOM from app filesystem only (exclude base image system packages)
      - name: Generate SBOM with Syft
        run: |
          # Extract standalone app from image and scan only that
          docker create --name sbom-extract landing-page-so-ate:${{ github.sha }}
          docker cp sbom-extract:/app - | tar -xf - -C /tmp/app-extract 2>/dev/null || true
          docker rm sbom-extract
          syft dir:/tmp/app-extract \
            -o cyclonedx-json \
            > security/reports/sbom.cdx.json
          rm -rf /tmp/app-extract

      # Step 2: Scan SBOM with Grype
      - name: Scan SBOM with Grype
        continue-on-error: true
        id: grype
        run: |
          grype sbom:security/reports/sbom.cdx.json \
            --fail-on high \
            -o json \
            > security/reports/grype-report.json

      # Step 3: Scan SBOM with Trivy
      - name: Scan SBOM with Trivy
        continue-on-error: true
        id: trivy-sbom
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: sbom
          input: security/reports/sbom.cdx.json
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: json
          output: security/reports/trivy-sbom-report.json

      # Step 4: Scan Docker image with Trivy
      - name: Scan Docker image with Trivy
        continue-on-error: true
        id: trivy-image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: landing-page-so-ate:${{ github.sha }}
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: /usr/local/lib/node_modules
          format: json
          output: security/reports/trivy-image-report.json

      # Upload reports (always, even on failure)
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: |
            security/reports/sbom.cdx.json
            security/reports/grype-report.json
            security/reports/trivy-sbom-report.json
            security/reports/trivy-image-report.json
          retention-days: 90

      # Security gate - fail if any scanner found HIGH/CRITICAL
      - name: Security Gate
        if: always()
        run: |
          FAILED=0

          if [ "${{ steps.grype.outcome }}" = "failure" ]; then
            echo "::error::Grype found HIGH/CRITICAL vulnerabilities"
            FAILED=1
          fi

          if [ "${{ steps.trivy-sbom.outcome }}" = "failure" ]; then
            echo "::error::Trivy SBOM scan found HIGH/CRITICAL vulnerabilities"
            FAILED=1
          fi

          if [ "${{ steps.trivy-image.outcome }}" = "failure" ]; then
            echo "::error::Trivy image scan found HIGH/CRITICAL issues"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "============================================"
            echo "  SECURITY GATE FAILED"
            echo "  HIGH/CRITICAL issues detected."
            echo "  Review artifacts for details."
            echo "============================================"
            exit 1
          fi

          echo ""
          echo "============================================"
          echo "  SECURITY GATE PASSED"
          echo "  No HIGH/CRITICAL issues found."
          echo "============================================"
